name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repo into a package-shaped directory
        uses: actions/checkout@v4
        with:
          path: comfyui_genshin_start

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Print Python info
        run: python --version && python -c "import sys; print(sys.platform)"

      - name: Verify package imports
        run: |
          python -c "import sys; sys.path.insert(0, '.'); import comfyui_genshin_start as pkg; print(list(pkg.NODE_CLASS_MAPPINGS.keys())); print(pkg.NODE_DISPLAY_NAME_MAPPINGS)"

      - name: Run stubbed smoke test
        run: python comfyui_genshin_start/_smoke_test.py

  windows-smoke:
    name: Smoke test (Windows / Python 3.11)
    runs-on: windows-latest

    steps:
      - name: Check out repo into a package-shaped directory
        uses: actions/checkout@v4
        with:
          path: comfyui_genshin_start

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run stubbed smoke test (Windows)
        run: python comfyui_genshin_start/_smoke_test.py

      - name: Run detection check (Windows runner has no Genshin, expect None)
        run: python comfyui_genshin_start/_check_detection.py
